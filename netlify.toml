[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/auth/callback"
  to = "/.netlify/functions/auth-callback"
  status = 200

[[redirects]]
  from = "/auth/url"
  to = "/.netlify/functions/auth-url"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
